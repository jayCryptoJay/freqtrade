databases:
  - name: sol-backtester-db
    databaseName: solbacktester
    plan: free

services:
  - type: web
    name: sol-backtester-api
    runtime: python
    rootDir: solana-backtester/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: sol-backtester-db
          property: connectionString
